name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=1 go build -tags fts5 -ldflags "-X main.version=ci" ./cmd/claude-monitor

      - name: Test
        run: CGO_ENABLED=1 go test -tags fts5 -race -v ./...

      - name: Vet
        run: go vet ./...
