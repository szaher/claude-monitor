<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Monitor</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <img src="/img/favicon.svg" alt="CM" class="sidebar-logo-img" width="32" height="32">
            <span class="sidebar-title">Claude Monitor</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="#dashboard" class="nav-link active" data-page="dashboard">
                <span class="nav-icon">&#9641;</span> Dashboard
            </a></li>
            <li><a href="#sessions" class="nav-link" data-page="sessions">
                <span class="nav-icon">&#9776;</span> Sessions
            </a></li>
            <li><a href="#live" class="nav-link" data-page="live">
                <span class="nav-icon">&#9679;</span> Live
            </a></li>
            <li><a href="#tools" class="nav-link" data-page="tools">
                <span class="nav-icon">&#9881;</span> Tools
            </a></li>
            <li><a href="#agents" class="nav-link" data-page="agents">
                <span class="nav-icon">&#9673;</span> Agents
            </a></li>
            <li><a href="#projects" class="nav-link" data-page="projects">
                <span class="nav-icon">&#9635;</span> Projects
            </a></li>
            <li><a href="#cost" class="nav-link" data-page="cost">
                <span class="nav-icon">$</span> Cost
            </a></li>
            <li><a href="#settings" class="nav-link" data-page="settings">
                <span class="nav-icon">&#9881;</span> Settings
            </a></li>
        </ul>
    </nav>

    <!-- Mobile hamburger toggle -->
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
    </button>

    <!-- Main wrapper -->
    <div class="main-wrapper">
        <!-- Top filter bar -->
        <header class="top-bar">
            <div class="top-bar-inner">
                <div class="filter-group">
                    <input type="search" id="filter-search" class="input" placeholder="Search sessions, tools..." aria-label="Search">
                </div>
                <div class="filter-group">
                    <label for="filter-from" class="filter-label">From</label>
                    <input type="date" id="filter-from" class="input input-date" aria-label="Date from">
                </div>
                <div class="filter-group">
                    <label for="filter-to" class="filter-label">To</label>
                    <input type="date" id="filter-to" class="input input-date" aria-label="Date to">
                </div>
                <div class="filter-group">
                    <select id="filter-project" class="input" aria-label="Project filter">
                        <option value="">All Projects</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="filter-model" class="input" aria-label="Model filter">
                        <option value="">All Models</option>
                    </select>
                </div>
            </div>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme" title="Theme: auto">
                <svg class="theme-icon theme-icon-auto" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
                    <path d="M12 6a6 6 0 0 0 0 12" fill="currentColor" opacity="0.3"/>
                </svg>
                <svg class="theme-icon theme-icon-light" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
                <svg class="theme-icon theme-icon-dark" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>

        <!-- Main content area -->
        <main id="main-content" class="main-content">
            <div class="loading-spinner"></div>
        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/components/dashboard.js"></script>
    <script src="/js/components/sessions.js"></script>
    <script src="/js/components/live.js"></script>
    <script src="/js/components/tools.js"></script>
    <script src="/js/components/agents.js"></script>
    <script src="/js/components/projects.js"></script>
    <script src="/js/components/cost.js"></script>
    <script src="/js/components/settings.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
